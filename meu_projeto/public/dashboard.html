<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#1e1e2f;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#111;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.card{
background:#2c2c3f;
padding:10px;
border-radius:10px;
}

canvas{
background:white;
}

</style>

</head>

<body>

<header>
Dashboard Aprovações
</header>

<div class="container">

<div class="card">
<canvas id="grafico1"></canvas>
</div>

<div class="card">
<canvas id="grafico2"></canvas>
</div>

<div class="card">
<canvas id="grafico3"></canvas>
</div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
